    <link rel="stylesheet" href="src/css/01_header.css" />

    <header>

            <span class="view-all">View All</span>
            <span class="close">X</span>

          <p class="certificate">Certificate</p>
          <p class="training">Training</p>
          <p class="organization">Organization</p>
          <p class="organization">Work-experience</p>

          <a href="https://www.dicoding.com/"><img src="src/img/dicoding.png" /></a>
          <a href="https://www.freecodecamp.org/khairulhabibie"><img src="src/img/fcc.png" /></a>
          <a href="https://sanbercode.com/"><img src="src/img/sanbercode.png" /></a>
        </aside>
      </section>
    </main>

    <div id="box">
      <div></div>
      <span class="close"></span>
    </div>

    <!-- footer -->
    <footer></footer>
    <!-- end footer -->

    <!-- js lib -->
    <script src="src/lib/jquery.js"></script>
    <script src="src/lib/sweetalert2.all.min.js"></script>
    <!-- my js -->
    <script src="src/js/00_index.js"></script>
    <script src="src/js/01_header.js"></script>
    <script src="src/js/02_main.js"></script>
    <script src="src/js/03_footer.js"></script>
